name: PR Checks

# Runs on every pull_request targeting main so bad commits cannot land
# without tests passing first.
#
# To make this a required status check, go to:
#   Settings → Branches → Branch protection rules → main
#   → "Require status checks to pass before merging"
#   → search for "Backend Tests" and add it.

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests
        run: npm test --if-present
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-pr-ci

      - name: Diagnostics on failure
        if: failure()
        run: |
          node --version
          npm --version
          echo "--- backend/package.json scripts ---"
          node -e "const pkg=require('./backend/package.json'); console.log(JSON.stringify(pkg.scripts, null, 2));"
          echo "--- tests/helpers/ ---"
          ls -la tests/helpers/
