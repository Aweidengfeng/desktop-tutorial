name: Build Android (APK + AAB)

on:
  pull_request:
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-android.yml'
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      HAS_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark workflow start
        run: touch /tmp/start-marker

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug environment
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Has iOS cert: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 != '' }}"
          echo "Has Android keystore: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}"
          ls -la
          cat capacitor.config.json | head -20

      - name: Install root dependencies
        run: npm install

      - name: Ensure Capacitor Android dependencies
        run: npm install --no-save @capacitor/core@8.3.4 @capacitor/cli@8.3.4 @capacitor/android@8.3.4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Android platform exists
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: .
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_ANDROID_KEYSTORE == 'true'
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build Debug AAB (unsigned validation)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || env.HAS_ANDROID_KEYSTORE != 'true' }}
        run: |
          cd android
          ./gradlew bundleDebug

      - name: Build Debug APK (directly installable)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Release AAB (signed)
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_ANDROID_KEYSTORE == 'true'
        run: |
          cd android
          ./gradlew bundleRelease --stacktrace

      - name: Upload release AAB artifact
        if: always() && hashFiles('android/app/build/outputs/bundle/release/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: summitlink-release-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload debug AAB artifact
        if: always() && hashFiles('android/app/build/outputs/bundle/debug/*.aab') != ''
        uses: actions/upload-artifact@v4
        with:
          name: summitlink-debug-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/debug/*.aab
          retention-days: 30

      - name: Upload debug APK artifact (install on phone)
        if: always() && hashFiles('android/app/build/outputs/apk/debug/*.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: summitlink-debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Cleanup keystore file
        if: always()
        run: |
          if [ -n "${KEYSTORE_FILE:-}" ]; then
            rm -f "$KEYSTORE_FILE"
          fi

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== Workflow failed. Collecting diagnostics ==="
          find . -name "*.log" -newer /tmp/start-marker 2>/dev/null | head -20
          ls -la ios/App/ 2>/dev/null || echo "no ios dir"
          ls -la android/ 2>/dev/null || echo "no android dir"
