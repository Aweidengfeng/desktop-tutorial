name: Deploy to Railway (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  env-check:
    name: Validate env script (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validate-env.js (dry-run with dummy vars)
        run: |
          node scripts/validate-env.js
        env:
          DRY_RUN: "1"
          # Provide dummy values so the script sees all .env.example keys as set
          NODE_ENV: test
          PORT: "8080"
          DATABASE_PROVIDER: postgresql
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET: ci_jwt_secret_placeholder_32chars_ok
          ADMIN_PASSWORD: ci_admin_password
          MAPBOX_TOKEN: pk.ci_dummy
          OSS_BUCKET: ci-bucket
          OSS_REGION: oss-cn-hangzhou
          OSS_ACCESS_KEY_ID: ci-key-id
          OSS_ACCESS_KEY_SECRET: ci-key-secret
          OSS_CDN_HOST: https://ci.example.com
          ALIYUN_ACCESS_KEY_ID: ci-aliyun-id
          ALIYUN_ACCESS_KEY_SECRET: ci-aliyun-secret
          SENTRY_DSN: https://ci@sentry.io/0
          SENTRY_ENV: test
          SENTRY_TRACES_RATE: "0.1"
          UPLOADS_DIR: /tmp/uploads
          REGION: cn-hangzhou
          SMTP_HOST: smtp.example.com
          SMTP_PORT: "465"
          SMTP_SECURE: "true"
          SMTP_USER: ci@example.com
          SMTP_PASS: ci_pass
          SMTP_FROM: SummitLink <noreply@summitlink.app>
          VAPID_PUBLIC_KEY: ci_vapid_public
          VAPID_PRIVATE_KEY: ci_vapid_private
          VAPID_MAILTO: mailto:admin@summitlink.app
          ANTHROPIC_API_KEY: ci_anthropic
          OPENAI_API_KEY: ci_openai
          AI_MODEL_CLAUDE: claude-3-haiku-20240307
          AI_MODEL_OPENAI: gpt-4o-mini
          STRIPE_SECRET_KEY: sk_test_ci_dummy
          STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
          STRIPE_WEBHOOK_SECRET: whsec_ci_dummy
          PAYMENT_PROVIDER: mock
          PAYMENT_NOTIFY_URL: https://summitlink.app/api/payment/notify/wechat
          WECHAT_APP_ID: ci_wechat_app
          WECHAT_MCH_ID: ci_wechat_mch
          WECHAT_API_KEY_V3: ci_wechat_key
          ALIPAY_APP_ID: ci_alipay_app
          ALIPAY_PRIVATE_KEY: ci_alipay_priv
          ALIPAY_PUBLIC_KEY: ci_alipay_pub
          PII_ENCRYPTION_KEY: ci_pii_key

  test:
    name: Run Tests
    needs: env-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run unit tests
        run: npm test --if-present
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-for-ci

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

      - name: CI diagnostics on test failure
        if: failure()
        run: |
          node --version
          npm --version
          echo "backend/package.json scripts:"
          node -e "const pkg=require('./backend/package.json'); console.log(JSON.stringify(pkg.scripts, null, 2));"
          if [ -d backend/tests/helpers ]; then
            ls -la backend/tests/helpers/
          else
            echo "backend/tests/helpers/ not found; listing tests/helpers/ instead:"
            ls -la tests/helpers/
          fi

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: railway up --service backend --detach

      - name: Note auto-deploy fallback
        if: ${{ env.RAILWAY_TOKEN == '' }}
        run: echo "ℹ️ RAILWAY_TOKEN not set — relying on Railway GitHub integration for auto-deploy on push to main."

      - name: Deploy status
        run: |
          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Railway deployment triggered successfully"
          else
            echo "ℹ️ Railway CLI deploy step skipped. Railway auto-deploys on push to main via GitHub integration."
          fi

  smoke-test:
    name: Production Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate production API URL
        run: |
          if [ -z "${{ secrets.PRODUCTION_API_URL }}" ]; then
            echo "❌ PRODUCTION_API_URL secret is required for smoke tests."
            exit 1
          fi

      - name: Wait for deployment health check
        run: |
          for i in $(seq 1 30); do
            response=$(curl -sS -w "\n%{http_code}" "${{ secrets.PRODUCTION_API_URL }}/api/health" || true)
            code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            if [ "$code" = "200" ]; then
              echo "✅ Health endpoint is ready."
              exit 0
            fi
            echo "⏳ Waiting for deployment... attempt $i/30 (status: $code)"
            if [ "$i" -eq 30 ]; then
              echo "❌ Final health check response body:"
              echo "$body"
            fi
            sleep 10
          done
          echo "❌ Deployment did not become healthy in time."
          exit 1

      - name: Run smoke tests
        run: node scripts/smoke-test.js
        env:
          API_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}
        continue-on-error: true

      - name: Report results
        run: echo "🚀 Deployment pipeline complete. Check Railway dashboard for deployment status."
