name: Health Check

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    name: Check production health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Railway production
        run: |
          HEALTH_URL="${{ vars.PRODUCTION_URL || 'https://alpinelink.up.railway.app' }}/api/health"
          echo "Checking: $HEALTH_URL"
          RESPONSE=$(curl -sf --max-time 10 "$HEALTH_URL" || echo '{"status":"error"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status // "error"')
          DB=$(echo "$RESPONSE" | jq -r '.db // "unknown"')
          echo "Status: $STATUS, DB: $DB"
          if [ "$STATUS" = "error" ]; then
            echo "❌ Health check FAILED"
            exit 1
          fi
          echo "✅ Health check PASSED (status=$STATUS, db=$DB)"
