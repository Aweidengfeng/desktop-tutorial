name: Build iOS IPA

on:
  pull_request:
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-android.yml'
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - 'capacitor.config.json'
      - 'ios/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-ios.yml'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    env:
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      HAS_IOS_CERT: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 != '' }}
      HAS_IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark workflow start
        run: touch /tmp/start-marker

      - name: Set safe ref name
        run: echo "SAFE_REF=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Debug environment
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Has iOS cert: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 != '' }}"
          echo "Has Android keystore: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}"
          ls -la
          cat capacitor.config.json | head -20

      - name: Install root dependencies
        run: npm install

      - name: Pin Capacitor plugin versions to match core
        run: |
          npm install --no-save \
            @capacitor/cli@6.2.0 \
            @capacitor/core@6.2.0 \
            @capacitor/ios@6.2.0 \
            @capacitor/status-bar@6.0.2 \
            @capacitor/share@6.0.2 \
            @capacitor/push-notifications@6.0.2 \
            @capacitor/camera@6.1.3
          echo "=== Capacitor versions ==="
          npx cap --version
          node -e "['@capacitor/core','@capacitor/status-bar','@capacitor/share','@capacitor/push-notifications','@capacitor/camera'].forEach(p => console.log(p, require(p + '/package.json').version))"

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d ios/App ] || [ ! -f ios/App/Podfile ]; then
            if [ -f ios/ExportOptions.plist ]; then
              cp ios/ExportOptions.plist /tmp/ExportOptions.plist
            fi
            rm -rf ios
            npx cap add ios --packagemanager CocoaPods
            if [ -f /tmp/ExportOptions.plist ]; then
              cp /tmp/ExportOptions.plist ios/ExportOptions.plist
            fi
          fi

      - name: Normalize iOS deployment target
        run: |
          if [ -f ios/App/Podfile ]; then
            sed -i.bak "s/platform :ios, '[0-9][0-9]*\\.[0-9]'/platform :ios, '15.0'/g" ios/App/Podfile
            sed -i.bak "s/\\['IPHONEOS_DEPLOYMENT_TARGET'\\] = '[0-9][0-9]*\\.[0-9]'/['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'/g" ios/App/Podfile
          fi
          if [ -f ios/App/App.xcodeproj/project.pbxproj ]; then
            sed -i.bak "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9][0-9]*\\.[0-9];/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/App/App.xcodeproj/project.pbxproj
          fi
          find ios/App -name '*.bak' -delete

      - name: Sync Capacitor
        run: |
          npx cap sync ios
          if [ ! -d ios/App/App.xcodeproj ]; then
            echo "ERROR: ios/App/App.xcodeproj not found after cap sync"
            ls -la ios/App/ 2>/dev/null || echo "ios/App dir does not exist"
            exit 1
          fi
          if [ ! -f ios/App/Podfile ]; then
            echo "ERROR: expected CocoaPods-based iOS project, but ios/App/Podfile is missing"
            find ios/App -maxdepth 3 -type f | sort | head -100
            exit 1
          fi
          echo "iOS project ready at ios/App/App.xcodeproj"
          echo "CocoaPods project detected"

      - name: Install CocoaPods
        run: |
          cd ios/App
          for attempt in 1 2 3; do
            pod install && exit 0
            echo "pod install failed on attempt ${attempt}, retrying..."
            sleep $((attempt * 10))
          done
          echo "pod install failed after 3 attempts"
          exit 1

      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_IOS_CERT == 'true'
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "${IOS_CERTIFICATE_P12_BASE64}" | base64 -d > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "${IOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_IOS_PROFILE == 'true'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${IOS_PROVISIONING_PROFILE_BASE64}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build & Archive (signed release)
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_IOS_CERT == 'true' && env.HAS_IOS_PROFILE == 'true'
        run: |
          if [ -d ios/App/App.xcworkspace ]; then
            XCODE_TARGET=(-workspace ios/App/App.xcworkspace)
          elif [ -d ios/App/App.xcodeproj ]; then
            XCODE_TARGET=(-project ios/App/App.xcodeproj)
          else
            echo "ERROR: Neither App.xcworkspace nor App.xcodeproj found"
            ls -la ios/App/ 2>/dev/null || true
            exit 1
          fi
          xcodebuild "${XCODE_TARGET[@]}" \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive

      - name: Build & Archive (unsigned validation)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || env.HAS_IOS_CERT != 'true' || env.HAS_IOS_PROFILE != 'true' }}
        run: |
          if [ -d ios/App/App.xcworkspace ]; then
            XCODE_TARGET=(-workspace ios/App/App.xcworkspace)
          elif [ -d ios/App/App.xcodeproj ]; then
            XCODE_TARGET=(-project ios/App/App.xcodeproj)
          else
            echo "ERROR: Neither App.xcworkspace nor App.xcodeproj found"
            ls -la ios/App/ 2>/dev/null || true
            exit 1
          fi
          xcodebuild "${XCODE_TARGET[@]}" \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        id: export_ipa
        continue-on-error: true
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build/ipa

      - name: Upload IPA artifact
        if: always() && hashFiles('build/ipa/**/*.ipa') != ''
        uses: actions/upload-artifact@v4
        with:
          name: summitlink-ios-${{ env.SAFE_REF }}
          path: build/ipa/
          retention-days: 30

      - name: Upload xcarchive fallback artifact
        if: always() && hashFiles('build/App.xcarchive/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: summitlink-ios-archive-${{ env.SAFE_REF }}
          path: build/App.xcarchive
          retention-days: 30

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== Workflow failed. Collecting diagnostics ==="
          find . -name "*.log" -newer /tmp/start-marker 2>/dev/null | head -20
          ls -la ios/App/ 2>/dev/null || echo "no ios dir"
          ls -la android/ 2>/dev/null || echo "no android dir"
