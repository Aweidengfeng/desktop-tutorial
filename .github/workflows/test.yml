name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: API & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 检出代码 ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 安装 Node.js 24 ─────────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 安装根级依赖（含 jest + supertest + playwright）──────────────────────
      - name: Install root dependencies
        run: npm install

      # ── 生成 Prisma Client ────────────────────────────────────────────────────
      - name: Generate Prisma Client
        run: DATABASE_URL="file:/tmp/ci.db" npx prisma generate --schema=backend/prisma/schema.prisma

      # ── 安装后端依赖（pino, express-rate-limit, multer 等）──────────────────
      - name: Install backend dependencies
        run: cd backend && npm install

      # ── 安装 Playwright 浏览器（仅 Chromium）───────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── 依赖安全扫描 ──────────────────────────────────────────────────────────
      - name: Audit backend dependencies
        run: npm audit --audit-level=high --production --prefix backend || true

      # ── 启动后端服务器（本地测试用）──────────────────────────────────────────
      - name: Start backend server
        run: cd backend && node db/seed.js && node app.js &
        env:
          NODE_ENV: test
          PORT: 8080
          JWT_SECRET: ci_test_secret_not_for_production
          ADMIN_PASSWORD: ci_test_admin_password
          API_BASE: http://localhost:8080

      # ── 等待服务器就绪 ────────────────────────────────────────────────────
      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:8080/api/health --timeout 30000

      # ── 运行 API 集成测试（旧版 + 新版 jest/supertest）─────────────────────
      - name: Run API tests
        run: npm run test:api
        env:
          BASE_URL: http://localhost:8080

      # ── 运行 Playwright E2E 测试 ─────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:8080

      # ── 上传测试报告（无论成功失败都保留）──────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      # ── 上传失败截图 ─────────────────────────────────────────────────────────
      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 14
          if-no-files-found: warn
