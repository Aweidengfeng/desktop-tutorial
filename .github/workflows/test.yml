name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  region-tests:
    name: Region Logic Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Run region unit tests
        run: npx jest --forceExit --no-coverage --runInBand --testMatch '**/backend/tests/{region,multi-region-db}.test.js'

  test:
    name: API & E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 检出代码 ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 安装 Node.js 24 ─────────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 安装根级依赖（含 jest + supertest + playwright）──────────────────────
      - name: Install root dependencies
        run: npm install

      # ── 安装后端依赖（pino, express-rate-limit, multer 等）──────────────────
      - name: Install backend dependencies
        run: cd backend && npm install

      # ── 从根目录生成 Prisma Client ──────────────────────────────────────────
      # 根因：root package.json 中安装了 @prisma/client，npm 将其 hoist 到根
      # node_modules/@prisma/client。backend/lib/db.js 中的 require('@prisma/client')
      # 因此解析到根目录的包，该包查找根 node_modules/.prisma/client（引擎二进制）。
      # 必须从根目录执行 prisma generate，才能将引擎写入根 node_modules/.prisma/client/，
      # 否则会报 "@prisma/client did not initialize yet"。
      - name: Generate Prisma Client (root)
        run: npx prisma generate --schema=backend/prisma/schema.prisma
        env:
          CHECKPOINT_DISABLE: "1"
          PRISMA_TELEMETRY_INFORMATION: ""

      # ── 推送 schema 到 SQLite 数据库（建表）────────────────────────────────
      # --skip-generate 避免重复生成，仅建表
      - name: Push Prisma schema to database
        run: npx prisma db push --schema=backend/prisma/schema.prisma --skip-generate
        env:
          DATABASE_URL: "file:/tmp/ci.db"
          CHECKPOINT_DISABLE: "1"
          PRISMA_TELEMETRY_INFORMATION: ""

      # ── 安装 Playwright 浏览器（仅 Chromium）───────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── 依赖安全扫描 ─────────────────────────────────────────────────────
      - name: Audit backend dependencies
        run: npm audit --audit-level=high --production --prefix backend || true

      # ── 启动后端服务器（本地测试用）──────────────────────────────────────────
      - name: Start backend server
        run: cd backend && node db/seed-prisma.js && node app.js &
        env:
          NODE_ENV: test
          PORT: 8080
          JWT_SECRET: ci_test_secret_not_for_production
          ADMIN_PASSWORD: ci_test_admin_password
          API_BASE: http://localhost:8080
          DATABASE_PROVIDER: sqlite
          DATABASE_URL: "file:/tmp/ci.db"
          DATABASE_PATH: "/tmp/ci.db"
          SEED_ON_START: "true"
          CHECKPOINT_DISABLE: "1"
          PRISMA_TELEMETRY_INFORMATION: ""

      # ── 等待服务器就绪 ────────────────────────────────────────────────────
      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:8080/api/health --timeout 30000

      # ── 校验种子数据已真正就绪（非空）───────────────────────────────────────
      - name: Verify seeded API data
        run: |
          check_non_empty_array() {
            local endpoint="$1"
            for i in {1..15}; do
              body="$(curl -fsS --retry 2 --retry-delay 1 --retry-all-errors "http://localhost:8080/api/${endpoint}" || true)"
              if [ -n "$body" ] && node -e "const d=JSON.parse(process.argv[1]); process.exit(Array.isArray(d)&&d.length>0?0:1)" "$body"; then
                echo "✅ /api/${endpoint} returned non-empty array"
                return 0
              fi
              echo "⏳ waiting /api/${endpoint} to become non-empty... (${i}/15)"
              sleep 2
            done
            echo "❌ /api/${endpoint} did not return a non-empty array"
            return 1
          }

          check_non_empty_array peaks
          check_non_empty_array posts
          check_non_empty_array teams

      - name: Run clickable audit check
        run: npm run audit:clickables
        env:
          BASE_URL: http://localhost:8080

      - name: Re-generate Prisma Client before API tests
        run: npx prisma generate --schema=backend/prisma/schema.prisma
        env:
          CHECKPOINT_DISABLE: "1"
          PRISMA_TELEMETRY_INFORMATION: ""
          DATABASE_URL: "file:/tmp/ci.db"

      # ── 运行 API 集成测试（旧版 + 新版 jest/supertest）─────────────────────
      - name: Run API tests
        run: npm run test:api
        env:
          BASE_URL: http://localhost:8080
          NODE_ENV: test
          DATABASE_PROVIDER: sqlite
          DATABASE_URL: "file:/tmp/ci.db"
          DATABASE_PATH: "/tmp/ci.db"
          JWT_SECRET: ci_test_secret_not_for_production
          ADMIN_PASSWORD: ci_test_admin_password
          CHECKPOINT_DISABLE: "1"
          PRISMA_TELEMETRY_INFORMATION: ""

      # ── 运行 Playwright E2E 测试 ─────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:8080

      # ── 上传测试报告（无论成功失败都保留）──────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: warn

      # ── 上传失败截图 ─────────────────────────────────────────────────────
      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 14
          if-no-files-found: warn
