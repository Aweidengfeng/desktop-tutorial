        stock:
          type: integer
          example: 5
        status:
          type: string
          enum: [available, rented, maintenance]
          example: available

    # ────────── 轨迹 ──────────
    Track:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        peak_name:
          type: string
          example: 珠穆朗玛峰
        date:
          type: string
          format: date
          example: "2026-05-10"
        max_elevation:
          type: integer
          example: 8849
        distance_km:
          type: number
          example: 12.5
        duration_min:
          type: integer
          example: 720
        gpx_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/track.gpx
        created_at:
          type: string
          format: date-time
          example: "2026-05-10T16:00:00Z"

    # ────────── 排行榜 ──────────
    LeaderboardEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 扎西
        avatar:
          type: string
          format: uri
          nullable: true
          example: https://example.com/avatar.jpg
        level:
          type: integer
          example: 8
        summit_count:
          type: integer
          example: 12
        max_elevation:
          type: integer
          example: 8849
        total_distance:
          type: number
          nullable: true
          example: 145.3
        best_peak:
          type: string
          example: 珠穆朗玛峰

  # ────────── 通用参数 ──────────
  parameters:
    PageParam:
      name: page
      in: query
      description: 页码，从 1 开始
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      description: 每页条数
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  # ────────── 通用响应 ──────────
  responses:
    Unauthorized:
      description: 未登录或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1003
            message: 未登录或Token无效
            data: null
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1004
            message: 权限不足
            data: null
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1005
            message: 资源不存在
            data: null
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1001
            message: 参数缺失
            data: null

# ══════════════════════════════════════════════════════
# PATHS
# ══════════════════════════════════════════════════════
paths:

  # ────────── 4.1 认证模块 ──────────
  /api/auth/send-code:
    post:
      tags: [Auth]
      summary: 发送短信验证码
      description: |
        通过阿里云短信服务向指定手机号发送6位数字验证码。
        同一手机号60秒内只能发送一次。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: 手机号（11位国内手机号）
                  example: "13800138000"
            example:
              phone: "13800138000"
      responses:
        '200':
