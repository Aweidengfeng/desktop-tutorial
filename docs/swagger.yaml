openapi: 3.0.3
info:
  title: AlpineLink 雪域 API
  description: |
    AlpineLink 雪域高端登山户外社交平台后端 API 文档。

    ## 认证方式
    大多数接口需要在请求头中携带 JWT Token：
    ```
    Authorization: Bearer <token>
    ```
    Token 通过 `/api/auth/login` 获取。

    ## 接口分级
    - **P0**：核心功能，认证模块
    - **P1**：主要业务，帖子、评论、山峰/路线、活动、消息
    - **P2**：扩展功能，向导、俱乐部、SOS、后台统计

    ## 统一响应格式
    ```json
    { "code": 0, "message": "success", "data": {} }
    ```

    ## WebSocket 实时消息
    连接地址：`ws://<host>/ws?token=<jwt_token>`

    消息格式：
    ```json
    { "type": "message", "chatId": 1, "content": "你好", "msgType": "text" }
    ```

    服务端推送格式：
    ```json
    { "type": "message", "data": { "id": 1, "chatId": 1, "senderId": 2, "content": "你好", "msgType": "text", "createdAt": "2026-01-01T00:00:00Z" } }
    ```
  version: 1.0.0
  contact:
    name: AlpineLink CEO
    url: https://desktop-tutorial-production-182a.up.railway.app

servers:
  - url: https://desktop-tutorial-production-182a.up.railway.app
    description: Railway 生产环境
  - url: http://localhost:3000
    description: 本地开发环境

tags:
  - name: Auth
    description: P0 — 认证模块（手机号+验证码登录）
  - name: Users
    description: P0 — 用户管理
  - name: Posts
    description: P1 — 帖子/动态模块
  - name: Comments
    description: P1 — 评论模块
  - name: Peaks
    description: P1 — 山峰模块
  - name: Routes
    description: P1 — 路线模块
  - name: Activities
    description: P1 — 活动/组队模块
  - name: Chats
    description: P1 — 消息/聊天模块
  - name: Guides
    description: P2 — 向导模块
  - name: Clubs
    description: P2 — 俱乐部模块
  - name: SOS
    description: P2 — SOS 安全模块
  - name: Stats
    description: P2 — 后台统计模块

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token，通过 `/api/auth/login` 获取

  schemas:
    # ────────── 通用 ──────────
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1003
        message:
          type: string
          example: 未登录或Token无效
        data:
          nullable: true
          example: null

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100

    # ────────── 用户 ──────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: 张三
        phone:
          type: string
          example: "13800138000"
        avatar:
          type: string
          format: uri
          example: https://example.com/avatar.jpg
        role:
          type: string
          enum: [user, admin, guide]
          example: user
        gender:
          type: string
          example: 男
        bio:
          type: string
          example: 热爱登山的探险家
        level:
          type: integer
          example: 5
        exp:
          type: integer
          example: 1200
        peaks:
          type: integer
          example: 3
        status:
          type: string
          enum: [active, banned]
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 帖子 ──────────
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        content:
          type: string
          example: 今天登顶珠穆朗玛峰，感觉太棒了！
        images:
          type: array
          items:
            type: string
            format: uri
          example:
            - https://example.com/img1.jpg
            - https://example.com/img2.jpg
        video_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/video.mp4
        location:
          type: string
          example: 珠穆朗玛峰大本营
        likes_count:
          type: integer
          example: 128
        comments_count:
          type: integer
          example: 32
        tags:
          type: array
          items:
            type: string
          example: [登山, 珠峰, 挑战]
        status:
          type: string
          enum: [active, hidden]
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 评论 ──────────
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        post_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 2
        content:
          type: string
          example: 太厉害了，我也想去！
        parent_id:
          type: integer
          nullable: true
          example: null
        likes_count:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 山峰 ──────────
    Peak:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 珠穆朗玛峰
        name_en:
          type: string
          example: Mount Everest
        altitude:
          type: integer
          example: 8848
        difficulty:
          type: string
          enum: [较易, 中等, 难, 极难]
          example: 极难
        country:
          type: string
          example: 中国/尼泊尔
        region:
          type: string
          example: 喜马拉雅山脉
        success_rate:
          type: number
          format: float
          example: 29.5
        death_count:
          type: integer
          example: 305
        best_season:
          type: string
          example: 4月-5月
        description:
          type: string
          example: 世界最高峰，海拔8848.86米
        cover_image:
          type: string
          format: uri
          example: https://example.com/everest.jpg
        status:
          type: string
          example: active

    # ────────── 路线 ──────────
    Route:
      type: object
      properties:
        id:
          type: integer
          example: 1
        peak_id:
          type: integer
          example: 1
        name:
          type: string
          example: 标准南坡路线
        difficulty:
          type: string
          enum: [较易, 中等, 难, 极难]
          example: 极难
        description:
          type: string
          example: 从尼泊尔侧登顶珠峰的经典路线
        cover_image:
          type: string
          format: uri
          example: https://example.com/route.jpg
        altitude:
          type: integer
          example: 8848
        duration_days:
          type: integer
          example: 60
        best_season:
          type: string
          example: 4月-5月
        region:
          type: string
          example: 尼泊尔
        status:
          type: string
          example: active

    # ────────── 活动 ──────────
    Activity:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        route_id:
          type: integer
          example: 1
        title:
          type: string
          example: 2026年春季珠峰登顶计划
        content:
          type: string
          example: 组织一支专业团队，计划2026年5月冲顶珠峰
        cover_image:
          type: string
          format: uri
          example: https://example.com/activity.jpg
        max_participants:
          type: integer
          example: 10
        current_participants:
          type: integer
          example: 3
        start_date:
          type: string
          format: date
          example: "2026-04-01"
        end_date:
          type: string
          format: date
          example: "2026-06-01"
        location:
          type: string
          example: 尼泊尔加德满都
        difficulty:
          type: string
          example: 极难
        status:
          type: string
          enum: [招募中, 已满, 进行中, 已结束]
          example: 招募中
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 聊天/消息 ──────────
    Chat:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id_1:
          type: integer
          example: 1
        user_id_2:
          type: integer
          example: 2
        last_message:
          type: string
          example: 明天见！
        last_time:
          type: string
          format: date-time
          example: "2026-01-01T12:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    Message:
      type: object
      properties:
        id:
          type: integer
          example: 1
        chat_id:
          type: integer
          example: 1
        sender_id:
          type: integer
          example: 1
        type:
          type: string
          enum: [text, image, voice]
          example: text
        content:
          type: string
          example: 明天见！
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T12:00:00Z"

    # ────────── 向导 ──────────
    Guide:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 10
        name:
          type: string
          example: 扎西
        country:
          type: string
          example: 中国
        avatar:
          type: string
          format: uri
          example: https://example.com/guide.jpg
        rating:
          type: number
          format: float
          example: 4.9
        review_count:
          type: integer
          example: 48
        specialty:
          type: string
          example: 8000米以上高峰
        daily_rate:
          type: integer
          example: 800
        experience:
          type: integer
          example: 15
        certifications:
          type: array
          items:
            type: string
          example: [UIAGM, 国家登山教练]
        bio:
          type: string
          example: 15年高海拔登山向导经验，成功带队登顶珠峰12次
        status:
          type: string
          enum: [pending, approved, rejected]
          example: approved

    # ────────── 俱乐部 ──────────
    Club:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 雪域探险俱乐部
        avatar:
          type: string
          format: uri
          example: https://example.com/club.jpg
        description:
          type: string
          example: 专注于高海拔登山的专业俱乐部
        cover_image:
          type: string
          format: uri
          example: https://example.com/club_cover.jpg
        leader_id:
          type: integer
          example: 1
        member_count:
          type: integer
          example: 50
        region:
          type: string
          example: 西藏
        status:
          type: string
          example: active

    # ────────── SOS ──────────
    SOS:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        location:
          type: string
          example: "28.0000,86.9250"
        message:
          type: string
          example: 受伤无法行走，需要紧急救援
        status:
          type: string
          enum: [待处理, 处理中, 已解决]
          example: 待处理
        handler_id:
          type: integer
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T08:00:00Z"
        resolved_at:
          type: string
          format: date-time
          nullable: true
          example: null

  # ────────── 通用参数 ──────────
  parameters:
    PageParam:
      name: page
      in: query
      description: 页码，从 1 开始
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      description: 每页条数
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  # ────────── 通用响应 ──────────
  responses:
    Unauthorized:
      description: 未登录或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1003
            message: 未登录或Token无效
            data: null
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1004
            message: 权限不足
            data: null
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1005
            message: 资源不存在
            data: null
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 1001
            message: 参数缺失
            data: null

# ══════════════════════════════════════════════════════
# PATHS
# ══════════════════════════════════════════════════════
paths:

  # ────────── 4.1 认证模块 ──────────
  /api/auth/send-code:
    post:
      tags: [Auth]
      summary: 发送短信验证码
      description: |
        通过阿里云短信服务向指定手机号发送6位数字验证码。
        同一手机号60秒内只能发送一次。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
                  description: 手机号（11位国内手机号）
                  example: "13800138000"
            example:
              phone: "13800138000"
      responses:
        '200':
          description: 验证码发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 0
                message: 验证码已发送
                data: null
        '400':
          description: 参数错误或发送过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_phone:
                  summary: 手机号缺失
                  value:
                    code: 1001
                    message: 参数缺失
                    data: null
                too_frequent:
                  summary: 60秒内重复发送
                  value:
                    code: 2001
                    message: 验证码已发送，请等待60秒
                    data: null

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 手机号+验证码登录（登录/注册合一）
      description: |
        用手机号和短信验证码登录。若该手机号未注册则自动注册并登录。
        成功后返回 JWT Token，有效期7天。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  example: "13800138000"
                code:
                  type: string
                  description: 6位短信验证码
                  example: "123456"
            example:
              phone: "13800138000"
              code: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          user:
                            $ref: '#/components/schemas/User'
              example:
                code: 0
                message: success
                data:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    id: 1
                    username: 用户13800138000
                    phone: "13800138000"
                    avatar: null
                    role: user
                    status: active
        '400':
          description: 验证码错误或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 2002
                message: 验证码错误或已过期
                data: null
        '403':
          description: 账号已被封禁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 2003
                message: 账号已被封禁
                data: null

  /api/auth/logout:
    get:
      tags: [Auth]
      summary: 退出登录
      description: 使当前 Token 失效（服务端加入黑名单）。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                code: 0
                message: 已退出登录
                data: null
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/profile:
    get:
      tags: [Users]
      summary: 获取当前用户个人资料
      description: 返回已登录用户的完整个人资料。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                code: 0
                message: success
                data:
                  id: 1
                  username: 张三
                  phone: "13800138000"
                  avatar: https://example.com/avatar.jpg
                  role: user
                  gender: 男
                  bio: 热爱登山的探险家
                  level: 5
                  exp: 1200
                  peaks: 3
                  status: active
                  created_at: "2026-01-01T00:00:00Z"
                  updated_at: "2026-01-01T00:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Users]
      summary: 更新个人资料
      description: 更新当前登录用户的个人资料，所有字段均为可选。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: 张三
                avatar:
                  type: string
                  format: uri
                  example: https://example.com/new_avatar.jpg
                gender:
                  type: string
                  example: 男
                bio:
                  type: string
                  example: 喜欢爬山
            example:
              username: 张三
              bio: 喜欢爬山，已登顶3座八千米高峰
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                code: 0
                message: 更新成功
                data:
                  id: 1
                  username: 张三
                  bio: 喜欢爬山，已登顶3座八千米高峰
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/users:
    get:
      tags: [Users]
      summary: 用户列表（需 admin 权限）
      description: 获取所有用户列表，支持分页，仅管理员可访问。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          description: 按状态筛选
          schema:
            type: string
            enum: [active, banned]
        - name: role
          in: query
          description: 按角色筛选
          schema:
            type: string
            enum: [user, admin, guide]
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/User'
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
              example:
                code: 0
                message: success
                data:
                  list:
                    - id: 1
                      username: 张三
                      phone: "13800138000"
                      role: user
                      status: active
                  total: 1000
                  page: 1
                  limit: 20
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: 获取用户详情
      description: 根据用户 ID 获取用户公开信息，需登录。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 用户 ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
              example:
                code: 0
                message: success
                data:
                  id: 1
                  username: 张三
                  avatar: https://example.com/avatar.jpg
