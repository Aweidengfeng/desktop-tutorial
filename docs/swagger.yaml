  /api/sos/{id}:
    put:
      tags: [SOS]
      summary: 处理 SOS（需 admin 权限）
      description: 管理员更新 SOS 处理状态，仅管理员可操作。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: SOS 记录 ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [处理中, 已解决]
                  example: 处理中
                handler_id:
                  type: integer
                  description: 处理人员 ID
                  example: 5
            example:
              status: 处理中
              handler_id: 5
      responses:
        '200':
          description: 处理成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SOS'
              example:
                code: 0
                message: 已更新处理状态
                data:
                  id: 1
                  status: 处理中
                  handler_id: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

