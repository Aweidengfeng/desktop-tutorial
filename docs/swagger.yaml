openapi: 3.0.3
info:
  title: AlpineLink 雪域 API
  description: |
    AlpineLink 雪域高端登山户外社交平台后端 API 文档。

    ## 认证方式
    大多数接口需要在请求头中携带 JWT Token：
    ```
    Authorization: Bearer <token>
    ```
    Token 通过 `/api/auth/login` 获取。

    ## 接口分级
    - **P0**：核心功能，认证模块
    - **P1**：主要业务，帖子、评论、山峰/路线、活动、消息
    - **P2**：扩展功能，向导、俱乐部、SOS、后台统计

    ## 统一响应格式
    ```json
    { "code": 0, "message": "success", "data": {} }
    ```

    ## WebSocket 实时消息
    连接地址：`ws://<host>/ws?token=<jwt_token>`

    消息格式：
    ```json
    { "type": "message", "chatId": 1, "content": "你好", "msgType": "text" }
    ```

    服务端推送格式：
    ```json
    { "type": "message", "data": { "id": 1, "chatId": 1, "senderId": 2, "content": "你好", "msgType": "text", "createdAt": "2026-01-01T00:00:00Z" } }
    ```
  version: 1.0.0
  contact:
    name: AlpineLink CEO
    url: https://desktop-tutorial-production-182a.up.railway.app

