  # ────────── 4.6 消息/聊天模块 ──────────
  /api/chats:
    get:
      tags: [Chats]
      summary: 会话列表
      description: |
        获取当前用户的所有私聊会话，按最后消息时间倒序排列。

        **WebSocket 实时消息说明：**
        - 连接地址：`ws://<host>/ws?token=<jwt_token>`
        - 连接成功后服务端推送未读消息数
        - 客户端发送消息格式：`{"type":"message","chatId":1,"content":"你好","msgType":"text"}`
        - 服务端推送格式：`{"type":"message","data":{...Message对象}}`
        - 心跳：客户端每30秒发送 `{"type":"ping"}`，服务端回复 `{"type":"pong"}`
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Chat'
                          total:
                            type: integer
              example:
                code: 0
                message: success
                data:
                  list:
                    - id: 1
                      user_id_1: 1
                      user_id_2: 2
                      last_message: 明天见！
                      last_time: "2026-01-01T12:00:00Z"
                  total: 10
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chats/start:
    post:
      tags: [Chats]
      summary: 发起会话
      description: 与指定用户发起私聊，若会话已存在则直接返回现有会话。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: integer
                  description: 对方用户 ID
                  example: 2
            example:
              user_id: 2
      responses:
        '200':
          description: 会话创建/获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Chat'
              example:
                code: 0
                message: success
                data:
                  id: 1
                  user_id_1: 1
                  user_id_2: 2
                  last_message: null
                  last_time: null
                  created_at: "2026-01-01T00:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chats/{id}/messages:
    get:
      tags: [Chats]
      summary: 消息历史
      description: 获取指定会话的消息记录，按发送时间倒序排列，支持分页。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 会话 ID
          schema:
            type: integer
            example: 1
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/Message'
                          total:
                            type: integer
              example:
                code: 0
                message: success
                data:
                  list:
                    - id: 1
                      chat_id: 1
                      sender_id: 1
                      type: text
                      content: 你好！
                      created_at: "2026-01-01T10:00:00Z"
                  total: 50
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Chats]
      summary: 发送消息（REST）
      description: |
        通过 REST 接口发送消息（也可通过 WebSocket 发送）。
        发送成功后，对方会通过 WebSocket 实时收到消息推送。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 会话 ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, type]
              properties:
                type:
                  type: string
                  enum: [text, image, voice]
                  example: text
                content:
                  type: string
                  example: 明天见！
            example:
              type: text
              content: 明天见！
      responses:
        '200':
          description: 发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Message'
              example:
                code: 0
                message: 发送成功
                data:
                  id: 10
                  chat_id: 1
                  sender_id: 1
                  type: text
                  content: 明天见！
                  created_at: "2026-01-01T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

