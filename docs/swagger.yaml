  # ────────── 4.9 SOS 安全模块 ──────────
  /api/sos:
    post:
      tags: [SOS]
      summary: 发送 SOS 求救信号
      description: |
        发送紧急求救信号，包含位置坐标和求救信息。
        发送后系统自动通知管理员，建议同时通过 WebSocket 实时推送。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [location]
              properties:
                location:
                  type: string
                  description: 位置坐标，格式为 "纬度,经度"
                  example: "28.0000,86.9250"
                message:
                  type: string
                  example: 受伤无法行走，需要紧急救援
            example:
              location: "28.0000,86.9250"
              message: 受伤无法行走，需要紧急救援
      responses:
        '200':
          description: SOS 发送成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SOS'
              example:
                code: 0
                message: SOS已发送，救援人员正在响应
                data:
                  id: 1
                  user_id: 1
                  location: "28.0000,86.9250"
                  message: 受伤无法行走，需要紧急救援
                  status: 待处理
                  created_at: "2026-01-01T08:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [SOS]
      summary: SOS 记录列表（需 admin 权限）
      description: 获取所有 SOS 求救记录，仅管理员可查看。
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          description: 按处理状态筛选
          schema:
            type: string
            enum: [待处理, 处理中, 已解决]
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          list:
                            type: array
                            items:
                              $ref: '#/components/schemas/SOS'
                          total:
                            type: integer
              example:
                code: 0
                message: success
                data:
                  list:
                    - id: 1
                      user_id: 1
                      location: "28.0000,86.9250"
                      message: 受伤无法行走，需要紧急救援
                      status: 待处理
                      created_at: "2026-01-01T08:00:00Z"
                  total: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/sos/{id}:
    put:
      tags: [SOS]
      summary: 处理 SOS（需 admin 权限）
      description: 管理员更新 SOS 处理状态，仅管理员可操作。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: SOS 记录 ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [处理中, 已解决]
                  example: 处理中
                handler_id:
                  type: integer
                  description: 处理人员 ID
                  example: 5
            example:
              status: 处理中
              handler_id: 5
      responses:
        '200':
          description: 处理成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SOS'
              example:
                code: 0
                message: 已更新处理状态
                data:
                  id: 1
                  status: 处理中
                  handler_id: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

