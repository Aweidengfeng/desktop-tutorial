components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token，通过 `/api/auth/login` 获取

  schemas:
    # ────────── 通用 ──────────
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1003
        message:
          type: string
          example: 未登录或Token无效
        data:
          nullable: true
          example: null

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100

    # ────────── 用户 ──────────
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: 张三
        phone:
          type: string
          example: "13800138000"
        avatar:
          type: string
          format: uri
          example: https://example.com/avatar.jpg
        role:
          type: string
          enum: [user, admin, guide]
          example: user
        gender:
          type: string
          example: 男
        bio:
          type: string
          example: 热爱登山的探险家
        level:
          type: integer
          example: 5
        exp:
          type: integer
          example: 1200
        peaks:
          type: integer
          example: 3
        status:
          type: string
          enum: [active, banned]
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 帖子 ──────────
    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        content:
          type: string
          example: 今天登顶珠穆朗玛峰，感觉太棒了！
        images:
          type: array
          items:
            type: string
            format: uri
          example:
            - https://example.com/img1.jpg
            - https://example.com/img2.jpg
        video_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/video.mp4
        location:
          type: string
          example: 珠穆朗玛峰大本营
        likes_count:
          type: integer
          example: 128
        comments_count:
          type: integer
          example: 32
        tags:
          type: array
          items:
            type: string
          example: [登山, 珠峰, 挑战]
        status:
          type: string
          enum: [active, hidden]
          example: active
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 评论 ──────────
    Comment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        post_id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 2
        content:
          type: string
          example: 太厉害了，我也想去！
        parent_id:
          type: integer
          nullable: true
          example: null
        likes_count:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
          example: "2026-01-01T00:00:00Z"

    # ────────── 山峰 ──────────
    Peak:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 珠穆朗玛峰
        name_en:
          type: string
          example: Mount Everest
        altitude:
          type: integer
          example: 8848
        difficulty:
          type: string
          enum: [较易, 中等, 难, 极难]
          example: 极难
        country:
          type: string
          example: 中国/尼泊尔
        region:
          type: string
          example: 喜马拉雅山脉
        success_rate:
          type: number
          format: float
          example: 29.5
        death_count:
          type: integer
          example: 305
        best_season:
          type: string
          example: 4月-5月
        description:
          type: string
          example: 世界最高峰，海拔8848.86米
        cover_image:
          type: string
          format: uri
          example: https://example.com/everest.jpg
        status:
          type: string
          example: active

    # ────────── 路线 ──────────
    Route:
