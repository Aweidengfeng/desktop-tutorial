    get:
      tags: [Leaderboard]
      summary: 多维度攀登榜单
      description: 支持按登顶次数、海拔、距离排序，支持用户/俱乐部维度，支持时间范围和峰种筛选。
      parameters:
        - name: sort
          in: query
          description: 排序维度
          schema:
            type: string
            enum: [count, elevation, distance]
            default: count
        - name: period
          in: query
          description: 时间范围
          schema:
            type: string
            enum: [week, month, year, all]
            default: month
        - name: scope
          in: query
          description: 统计维度（用户/俱乐部）
          schema:
            type: string
            enum: [user, club]
            default: user
        - name: peak_type
          in: query
          description: 峰种筛选
          schema:
            type: string
            enum: [8000ers, continental, world, alpine]
        - name: month
          in: query
          description: 指定月份（YYYY-MM，period=month 时生效）
          schema:
            type: string
            example: "2026-05"
      responses:
        '200':
          description: 榜单数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                    nullable: true
                    example: "2026-05"
                  period:
                    type: string
                    example: month
                  sort:
                    type: string
                    example: count
                  scope:
                    type: string
                    example: user
                  peak_type:
                    type: string
                    nullable: true
                    example: null
                  leaders:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'

  /api/leaderboard/monthly:
    get:
      tags: [Leaderboard]
      summary: 本月攀登月榜（兼容旧版，Top 10）
      responses:
        '200':
          description: 月榜 Top 10
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaderboardEntry'

