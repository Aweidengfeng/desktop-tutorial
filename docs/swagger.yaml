              examples:
                missing_phone:
                  summary: 手机号缺失
                  value:
                    code: 1001
                    message: 参数缺失
                    data: null
                too_frequent:
                  summary: 60秒内重复发送
                  value:
                    code: 2001
                    message: 验证码已发送，请等待60秒
                    data: null

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 手机号+验证码登录（登录/注册合一）
      description: |
        用手机号和短信验证码登录。若该手机号未注册则自动注册并登录。
        成功后返回 JWT Token，有效期7天。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: string
                  example: "13800138000"
                code:
                  type: string
                  description: 6位短信验证码
                  example: "123456"
            example:
              phone: "13800138000"
              code: "123456"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          user:
                            $ref: '#/components/schemas/User'
              example:
                code: 0
                message: success
                data:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    id: 1
                    username: 用户13800138000
                    phone: "13800138000"
                    avatar: null
                    role: user
                    status: active
        '400':
          description: 验证码错误或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 2002
                message: 验证码错误或已过期
                data: null
        '403':
          description: 账号已被封禁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 2003
                message: 账号已被封禁
                data: null

