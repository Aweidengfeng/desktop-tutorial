<!DOCTYPE html>
<!-- 联系我们：邮箱、电话、在线留言、二维码与社交媒体 -->
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummitLink · Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, colors: { space: '#0A0A0F', glacier: '#4FACFE', ridge: '#F5A623' } } } };
  </script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body data-page="contact" data-page-title="titles.contact" class="bg-space font-sans text-white antialiased">
  <div data-site-header></div>
  <main class="pt-28">
    <section class="mx-auto max-w-7xl px-4 py-16" data-reveal>
      <span class="inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs uppercase tracking-[0.28em] text-white/60" data-i18n="contact.heroEyebrow"></span>
      <h1 class="mt-6 font-display text-5xl font-black leading-none md:text-7xl" data-i18n="contact.heroTitle"></h1>
      <p class="mt-6 max-w-3xl text-lg leading-8 text-white/65" data-i18n="contact.heroBody"></p>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-6">
      <div class="grid gap-6 md:grid-cols-3">
        <article class="glass-panel rounded-[1.75rem] p-6" data-reveal><div class="text-sm text-white/50" data-i18n="contact.climbersEmail"></div><div class="mt-3 text-xl font-semibold">hello@summitlink.com</div></article>
        <article class="glass-panel rounded-[1.75rem] p-6" data-reveal><div class="text-sm text-white/50" data-i18n="contact.guidesEmail"></div><div class="mt-3 text-xl font-semibold">guides@summitlink.com</div></article>
        <article class="glass-panel rounded-[1.75rem] p-6" data-reveal><div class="text-sm text-white/50" data-i18n="contact.corporateEmail"></div><div class="mt-3 text-xl font-semibold">corporate@summitlink.com</div></article>
      </div>
      <div class="mt-6 grid gap-6 md:grid-cols-2">
        <article class="glass-panel rounded-[1.75rem] p-6" data-reveal><div class="text-sm text-white/50" data-i18n="contact.phoneChina"></div><div class="mt-3 text-xl font-semibold">+86 400-XXX-XXXX</div></article>
        <article class="glass-panel rounded-[1.75rem] p-6" data-reveal><div class="text-sm text-white/50" data-i18n="contact.phoneGlobal"></div><div class="mt-3 text-xl font-semibold">+1 (888) XXX-XXXX</div></article>
      </div>
    </section>

    <section class="mx-auto grid max-w-7xl gap-6 px-4 py-16 lg:grid-cols-[1.05fr_0.95fr]">
      <form class="glass-panel rounded-[2rem] p-6" data-mock-form data-success-title-key="contact.successTitle" data-success-body-key="contact.successBody" data-reveal>
        <h2 class="text-3xl font-black" data-i18n="contact.formTitle"></h2>
        <div class="mt-6 grid gap-4 md:grid-cols-2">
          <label class="text-sm text-white/60"><span data-i18n="contact.name"></span><input required class="form-input mt-2" type="text" /></label>
          <label class="text-sm text-white/60"><span data-i18n="contact.email"></span><input required class="form-input mt-2" type="email" /></label>
        </div>
        <label class="mt-4 block text-sm text-white/60"><span data-i18n="contact.identity"></span>
          <select required class="form-select mt-2">
            <option value="" data-i18n="contact.identity"></option>
            <option data-i18n="contact.identityClimber"></option>
            <option data-i18n="contact.identityGuide"></option>
            <option data-i18n="contact.identityCorporate"></option>
          </select>
        </label>
        <label class="mt-4 block text-sm text-white/60"><span data-i18n="contact.message"></span><textarea required class="form-textarea mt-2"></textarea></label>
        <button type="submit" class="mt-6 rounded-full bg-gradient-to-r from-sky-400 to-amber-400 px-6 py-3 text-sm font-semibold text-slate-950" data-i18n="common.sendMessage"></button>
      </form>
      <div class="space-y-6">
        <article class="glass-panel rounded-[2rem] p-6" data-reveal>
          <h2 class="text-3xl font-black" data-i18n="contact.qrTitle"></h2>
          <div class="mt-6 flex h-56 items-center justify-center rounded-[1.75rem] border border-dashed border-white/15 bg-white/5 text-white/45" data-i18n="contact.qrBody"></div>
        </article>
        <article class="glass-panel rounded-[2rem] p-6" data-reveal>
          <h2 class="text-3xl font-black" data-i18n="contact.socialTitle"></h2>
          <div class="mt-6 flex flex-wrap gap-3">
            <span class="badge-button">WeChat</span>
            <span class="badge-button">Instagram</span>
            <span class="badge-button">YouTube</span>
            <span class="badge-button">LinkedIn</span>
          </div>
        </article>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
