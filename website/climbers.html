<!DOCTYPE html>
<!-- 攀登者专属落地页：发现山峰、寻找向导、预约远征、记录轨迹 -->
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummitLink · Climbers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, colors: { space: '#0A0A0F', glacier: '#4FACFE', ridge: '#F5A623' } } } };
  </script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body data-page="climbers" data-page-title="titles.climbers" class="bg-space font-sans text-white antialiased">
  <div data-site-header></div>
  <main class="pt-28">
    <section class="relative overflow-hidden px-4 py-16">
      <div class="particles" data-particles="32"></div>
      <div class="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[1.1fr_0.9fr] lg:items-center">
        <div class="space-y-6" data-reveal>
          <span class="inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs uppercase tracking-[0.28em] text-white/60" data-i18n="climbers.heroEyebrow"></span>
          <h1 class="font-display text-5xl font-black leading-none md:text-7xl" data-i18n="climbers.heroTitle"></h1>
          <p class="max-w-2xl text-lg leading-8 text-white/65" data-i18n="climbers.heroBody"></p>
          <div class="flex flex-wrap gap-4">
            <a href="./guides.html" class="rounded-full bg-gradient-to-r from-sky-400 to-amber-400 px-6 py-3 text-sm font-semibold text-slate-950" data-i18n="climbers.primary"></a>
            <a href="./peaks.html" class="rounded-full border border-white/10 px-6 py-3 text-sm font-semibold text-white/80" data-i18n="climbers.secondary"></a>
          </div>
        </div>
        <div class="glass-panel rounded-[2rem] p-6" data-reveal>
          <div class="grid gap-4 sm:grid-cols-3">
            <div class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5">
              <div class="metric-value text-3xl text-sky-300">14+</div>
              <div class="mt-2 text-xs text-white/60" data-i18n="home.stats1"></div>
            </div>
            <div class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5">
              <div class="metric-value text-3xl text-sky-300">1:1</div>
              <div class="mt-2 text-xs text-white/60" data-i18n="home.feature2Title"></div>
            </div>
            <div class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5">
              <div class="metric-value text-3xl text-sky-300">24/7</div>
              <div class="mt-2 text-xs text-white/60" data-i18n="home.feature6Title"></div>
            </div>
          </div>
          <div class="mt-6 rounded-[1.6rem] border border-white/10 bg-black/20 p-5 text-sm leading-7 text-white/65" data-i18n="climbers.routeTitle"></div>
        </div>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-16">
      <h2 class="mb-8 font-display text-4xl font-black" data-i18n="climbers.gridTitle" data-reveal></h2>
      <div class="grid gap-6 md:grid-cols-3">
        <article class="glass-panel halo-card rounded-[1.7rem] p-6" data-reveal>
          <h3 class="text-2xl font-bold" data-i18n="climbers.grid1Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.grid1Body"></p>
        </article>
        <article class="glass-panel halo-card rounded-[1.7rem] p-6" data-reveal>
          <h3 class="text-2xl font-bold" data-i18n="climbers.grid2Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.grid2Body"></p>
        </article>
        <article class="glass-panel halo-card rounded-[1.7rem] p-6" data-reveal>
          <h3 class="text-2xl font-bold" data-i18n="climbers.grid3Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.grid3Body"></p>
        </article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-16">
      <h2 class="mb-8 font-display text-4xl font-black" data-i18n="climbers.expeditionTitle" data-reveal></h2>
      <div class="grid gap-6 lg:grid-cols-3">
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal>
          <div class="placeholder-summit"></div>
          <h3 class="mt-5 text-2xl font-bold" data-i18n="climbers.expedition1Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.expedition1Body"></p>
        </article>
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal>
          <div class="placeholder-summit"></div>
          <h3 class="mt-5 text-2xl font-bold" data-i18n="climbers.expedition2Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.expedition2Body"></p>
        </article>
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal>
          <div class="placeholder-summit"></div>
          <h3 class="mt-5 text-2xl font-bold" data-i18n="climbers.expedition3Title"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="climbers.expedition3Body"></p>
        </article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-16">
      <div class="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]">
        <article class="glass-panel rounded-[1.8rem] p-6" data-reveal>
          <h2 class="font-display text-4xl font-black" data-i18n="climbers.routeTitle"></h2>
          <div class="mt-6 space-y-4 text-sm leading-7 text-white/70">
            <p data-i18n="climbers.route1"></p>
            <p data-i18n="climbers.route2"></p>
            <p data-i18n="climbers.route3"></p>
          </div>
        </article>
        <article class="glass-panel rounded-[1.8rem] p-6" data-reveal>
          <p class="text-xl font-semibold leading-9 text-white/85" data-i18n="climbers.quote"></p>
          <p class="mt-6 text-sm text-white/55" data-i18n="climbers.quoteName"></p>
        </article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 pb-8 pt-12">
      <div class="glass-panel rounded-[2rem] p-8 text-center" data-reveal>
        <h2 class="font-display text-4xl font-black" data-i18n="climbers.ctaTitle"></h2>
        <p class="mx-auto mt-4 max-w-3xl text-lg leading-8 text-white/65" data-i18n="climbers.ctaBody"></p>
        <a href="./apply.html#corporate" class="mt-8 inline-flex rounded-full bg-gradient-to-r from-sky-400 to-amber-400 px-6 py-3 text-sm font-semibold text-slate-950" data-i18n="climbers.ctaButton"></a>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
