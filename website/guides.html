<!DOCTYPE html>
<!-- 向导专属落地页：资质展示、收益说明、认证流程与成功案例 -->
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummitLink · Guides</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Sora', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }, colors: { space: '#0A0A0F', glacier: '#4FACFE', ridge: '#F5A623' } } } };
  </script>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body data-page="guides" data-page-title="titles.guides" class="bg-space font-sans text-white antialiased">
  <div data-site-header></div>
  <main class="pt-28">
    <section class="relative overflow-hidden px-4 py-16">
      <div class="particles" data-particles="30"></div>
      <div class="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[1.05fr_0.95fr]">
        <div class="space-y-6" data-reveal>
          <span class="inline-flex rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs uppercase tracking-[0.28em] text-white/60" data-i18n="guides.heroEyebrow"></span>
          <h1 class="font-display text-5xl font-black leading-none md:text-7xl" data-i18n="guides.heroTitle"></h1>
          <p class="max-w-2xl text-lg leading-8 text-white/65" data-i18n="guides.heroBody"></p>
          <div class="flex flex-wrap gap-4">
            <a href="./apply.html#guide" class="rounded-full bg-gradient-to-r from-sky-400 to-amber-400 px-6 py-3 text-sm font-semibold text-slate-950" data-i18n="guides.primary"></a>
            <a href="#calculator" class="rounded-full border border-white/10 px-6 py-3 text-sm font-semibold text-white/80" data-i18n="guides.secondary"></a>
          </div>
        </div>
        <div class="glass-panel rounded-[2rem] p-6" id="calculator" data-reveal>
          <h2 class="text-3xl font-black" data-i18n="guides.calcTitle"></h2>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="guides.calcBody"></p>
          <div class="mt-6 grid gap-4 sm:grid-cols-2">
            <label class="text-sm text-white/60"><span data-i18n="guides.dailyRate"></span>
              <input type="number" class="form-input mt-2" value="650" min="0" step="10" data-guide-rate />
            </label>
            <label class="text-sm text-white/60"><span data-i18n="guides.annualDays"></span>
              <input type="number" class="form-input mt-2" value="120" min="0" step="1" data-guide-days />
            </label>
          </div>
          <div class="mt-6 rounded-[1.6rem] border border-white/10 bg-black/20 p-5">
            <div class="text-xs uppercase tracking-[0.28em] text-white/40" data-i18n="guides.expectedIncome"></div>
            <div class="mt-3 flex items-end gap-3"><span class="metric-value text-5xl font-black text-sky-300">$</span><span class="metric-value text-5xl font-black text-sky-300" data-guide-income>0</span></div>
            <div class="mt-3 text-sm text-white/55" data-i18n="common.calcIncomeLabel"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-16">
      <h2 class="mb-8 font-display text-4xl font-black" data-i18n="guides.flowTitle" data-reveal></h2>
      <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-4">
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal><div class="text-sm text-sky-300">01</div><p class="mt-4 text-sm leading-7 text-white/70" data-i18n="guides.flow1"></p></article>
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal><div class="text-sm text-sky-300">02</div><p class="mt-4 text-sm leading-7 text-white/70" data-i18n="guides.flow2"></p></article>
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal><div class="text-sm text-sky-300">03</div><p class="mt-4 text-sm leading-7 text-white/70" data-i18n="guides.flow3"></p></article>
        <article class="glass-panel rounded-[1.7rem] p-6" data-reveal><div class="text-sm text-sky-300">04</div><p class="mt-4 text-sm leading-7 text-white/70" data-i18n="guides.flow4"></p></article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 py-16">
      <h2 class="mb-8 font-display text-4xl font-black" data-i18n="guides.casesTitle" data-reveal></h2>
      <div class="grid gap-6 lg:grid-cols-3">
        <article class="glass-panel halo-card rounded-[1.75rem] p-6" data-reveal>
          <div class="text-sm text-white/50" data-i18n="guides.case1Meta"></div>
          <h3 class="mt-4 text-2xl font-bold" data-i18n="guides.case1Name"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="guides.case1Body"></p>
        </article>
        <article class="glass-panel halo-card rounded-[1.75rem] p-6" data-reveal>
          <div class="text-sm text-white/50" data-i18n="guides.case2Meta"></div>
          <h3 class="mt-4 text-2xl font-bold" data-i18n="guides.case2Name"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="guides.case2Body"></p>
        </article>
        <article class="glass-panel halo-card rounded-[1.75rem] p-6" data-reveal>
          <div class="text-sm text-white/50" data-i18n="guides.case3Meta"></div>
          <h3 class="mt-4 text-2xl font-bold" data-i18n="guides.case3Name"></h3>
          <p class="mt-3 text-sm leading-7 text-white/65" data-i18n="guides.case3Body"></p>
        </article>
      </div>
    </section>

    <section class="mx-auto max-w-7xl px-4 pb-8 pt-12">
      <div class="glass-panel rounded-[2rem] p-8 text-center" data-reveal>
        <h2 class="font-display text-4xl font-black" data-i18n="guides.ctaTitle"></h2>
        <p class="mx-auto mt-4 max-w-3xl text-lg leading-8 text-white/65" data-i18n="guides.ctaBody"></p>
        <a href="./apply.html#guide" class="mt-8 inline-flex rounded-full bg-gradient-to-r from-sky-400 to-amber-400 px-6 py-3 text-sm font-semibold text-slate-950" data-i18n="guides.ctaButton"></a>
      </div>
    </section>
  </main>
  <div data-site-footer></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
