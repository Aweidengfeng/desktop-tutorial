events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Gzip 压缩
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_comp_level 6;

  # 日志格式
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  upstream alpinelink_backend {
    least_conn;
    server backend:8080;
    keepalive 64;
  }

  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

  # HTTP → HTTPS 重定向（生产启用）
  server {
    listen 80;
    server_name _;

    # 静态资源 CDN 缓存（长期缓存）
    location /uploads/ {
      alias /app/uploads/;
      expires 365d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options nosniff;
      add_header Vary Accept-Encoding;
    }

    # Universal Links / App Links – must not be cached or redirected
    location /.well-known/ {
      proxy_pass http://alpinelink_backend;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }

    # JS 资源不做强缓存，避免 app-core.js / map-core.js 残留旧版逻辑
    location ~* \.js$ {
      proxy_pass http://alpinelink_backend;
      expires -1;
      add_header Cache-Control "no-cache, must-revalidate";
      add_header Pragma "no-cache";
      add_header Vary Accept-Encoding;
    }

    # CSS/图片等静态资源
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://alpinelink_backend;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      add_header Vary Accept-Encoding;
    }

    # API 接口（不缓存）
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://alpinelink_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      add_header Cache-Control "no-store, no-cache";
    }

    # 上传接口
    location /api/upload {
      limit_req zone=upload burst=10 nodelay;
      client_max_body_size 210m;
      proxy_pass http://alpinelink_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # Socket.IO WebSocket
    location /socket.io/ {
      proxy_pass http://alpinelink_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # 前端 SPA（HTML 不缓存）
    location / {
      proxy_pass http://alpinelink_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      add_header Cache-Control "no-cache, must-revalidate";
    }
  }
}
