version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ccr.ccs.tencentyun.com/unsummit/backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DEPLOY_TARGET: tencent-cloud
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${DATABASE_URL_CN}
      DATABASE_URL_CN: ${DATABASE_URL_CN}
      DATABASE_URL_US: ${DATABASE_URL_US:-}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOADS_DIR: /app/uploads
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-beijing}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_CDN_DOMAIN: ${COS_CDN_DOMAIN:-}
      TENCENT_CLOUD_APPID: ${TENCENT_CLOUD_APPID:-}
      TENCENT_CLOUD_REGION: ${TENCENT_CLOUD_REGION:-ap-beijing}
      STRIPE_DISABLED: "true"
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-wechat}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_API_KEY_V3: ${WECHAT_API_KEY_V3:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ICP_NUMBER: ${ICP_NUMBER:-京ICP备XXXXXXXX号（备案中）}
      ICP_POLICE_NUMBER: ${ICP_POLICE_NUMBER:-京公网安备XXXXXXXXXXXXX号（备案中）}
    volumes:
      - uploads_data_cn:/app/uploads
      - logs_cn:/var/log/summitlink
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "60"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  nginx:
    image: ccr.ccs.tencentyun.com/library/nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data_cn:/app/uploads:ro
      - logs_cn:/var/log/nginx
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "60"

volumes:
  uploads_data_cn:
  logs_cn:
