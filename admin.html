<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SummitLink 后台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    body { background: #0f172a; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    .glass-dark { background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-screen text-white font-sans" x-data="adminApp()" x-cloak>

  <!-- Toast 通知 -->
  <div class="fixed top-6 right-6 z-50 space-y-2" style="min-width:260px">
    <template x-for="(t, i) in toasts" :key="i">
      <div class="glass px-4 py-3 rounded-xl flex items-center gap-3 shadow-lg transition-all"
           :class="t.type === 'error' ? 'border-red-500/50 bg-red-900/30' : 'border-green-500/50 bg-green-900/30'">
        <span x-text="t.type === 'error' ? '❌' : '✅'"></span>
        <span class="text-sm" x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <!-- 登录页 -->
  <div x-show="!isLoggedIn" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl p-8 w-full max-w-sm shadow-2xl">
      <div class="text-center mb-8">
        <div class="text-4xl mb-2">🏔️</div>
        <h1 class="text-2xl font-bold">SummitLink</h1>
        <p class="text-white/50 text-sm mt-1">后台管理中心</p>
      </div>
      <form @submit.prevent="doLogin" class="space-y-4">
        <div>
          <label class="text-sm text-white/70 mb-1 block">管理员账号</label>
          <input x-model="loginForm.username" type="text" placeholder="用户名"
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-blue-400" />
        </div>
        <div>
          <label class="text-sm text-white/70 mb-1 block">密码</label>
          <input x-model="loginForm.password" type="password" placeholder="密码"
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-white/30 focus:outline-none focus:border-blue-400" />
        </div>
        <button type="submit" :disabled="loginLoading"
                class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 rounded-xl py-2.5 font-semibold transition">
          <span x-text="loginLoading ? '登录中…' : '登 录'"></span>
        </button>
      </form>
    </div>
  </div>

  <!-- 主界面 -->
  <div x-show="isLoggedIn" class="flex min-h-screen">

    <!-- 侧边栏 -->
    <aside class="glass-dark w-56 flex-shrink-0 flex flex-col py-6 px-3 fixed top-0 left-0 h-full z-30">
      <div class="text-center mb-8 px-2">
        <div class="text-2xl">🏔️</div>
        <div class="text-sm font-bold mt-1">SummitLink Admin</div>
      </div>
      <nav class="flex-1 space-y-1">
        <template x-for="nav in navItems" :key="nav.id">
          <button @click="page = nav.id; loadPage()"
                  class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition"
                  :class="page === nav.id ? 'bg-blue-600 text-white' : 'text-white/60 hover:bg-white/10 hover:text-white'">
            <span x-text="nav.icon"></span>
            <span x-text="nav.label"></span>
          </button>
        </template>
      </nav>
      <button @click="logout" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-red-400 hover:bg-white/10 transition w-full mt-4">
        <span>🚪</span><span>退出登录</span>
      </button>
    </aside>

    <!-- 主内容区 -->
    <main class="ml-56 flex-1 p-6 min-h-screen">

      <!-- 数据总览 -->
      <div x-show="page === 'stats'">
        <h2 class="text-xl font-bold mb-6">📊 数据总览</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
          <template x-for="card in statsCards" :key="card.label">
            <div class="glass rounded-2xl p-5">
              <div class="text-2xl mb-1" x-text="card.icon"></div>
              <div class="text-2xl font-bold" x-text="card.value ?? '—'"></div>
              <div class="text-white/50 text-sm mt-1" x-text="card.label"></div>
            </div>
          </template>
        </div>
        <div x-show="statsLoading" class="text-center text-white/40 py-8">加载中…</div>
      </div>

      <!-- 用户管理 -->
      <div x-show="page === 'users'">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold">👥 用户管理</h2>
          <input x-model="userSearch" @input.debounce.400ms="loadUsers(1)" type="text"
                 placeholder="搜索姓名/手机/用户名"
                 class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-blue-400 w-52" />
        </div>
        <div class="glass rounded-2xl overflow-hidden">
          <table class="w-full text-sm">
            <thead class="border-b border-white/10 text-white/50">
              <tr>
                <th class="text-left px-4 py-3">用户</th>
                <th class="text-left px-4 py-3">手机</th>
                <th class="text-left px-4 py-3">注册时间</th>
                <th class="text-left px-4 py-3">状态</th>
                <th class="text-left px-4 py-3">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="u in users" :key="u.id">
                <tr class="border-b border-white/5 hover:bg-white/5">
                  <td class="px-4 py-3 flex items-center gap-2">
                    <img :src="u.avatar || 'https://i.pravatar.cc/32?u='+u.id" class="w-7 h-7 rounded-full" />
                    <span x-text="u.name"></span>
                  </td>
                  <td class="px-4 py-3 text-white/60" x-text="u.phone || '—'"></td>
                  <td class="px-4 py-3 text-white/60" x-text="u.created_at ? u.created_at.slice(0,10) : '—'"></td>
                  <td class="px-4 py-3">
                    <span :class="u.is_banned ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'"
                          class="px-2 py-0.5 rounded-full text-xs" x-text="u.is_banned ? '已封禁' : '正常'"></span>
                  </td>
                  <td class="px-4 py-3">
                    <button @click="banUser(u)"
                            :class="u.is_banned ? 'text-green-400 hover:text-green-300' : 'text-red-400 hover:text-red-300'"
                            class="text-xs transition" x-text="u.is_banned ? '解封' : '封禁'"></button>
                  </td>
                </tr>
              </template>
              <tr x-show="!users.length && !usersLoading">
                <td colspan="5" class="text-center text-white/30 py-8">暂无数据</td>
              </tr>
              <tr x-show="usersLoading">
                <td colspan="5" class="text-center text-white/30 py-8">加载中…</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center mt-4 text-sm text-white/50">
          <span>共 <span x-text="usersTotal"></span> 条</span>
          <div class="flex gap-2">
            <button @click="usersPage > 1 && loadUsers(usersPage - 1)"
                    :disabled="usersPage <= 1"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">上一页</button>
            <span class="px-3 py-1" x-text="'第 ' + usersPage + ' 页'"></span>
            <button @click="usersPage * 20 < usersTotal && loadUsers(usersPage + 1)"
                    :disabled="usersPage * 20 >= usersTotal"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">下一页</button>
          </div>
        </div>
      </div>

      <!-- 内容审核 -->
      <div x-show="page === 'posts'">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold">📝 内容审核</h2>
          <select x-model="postsFilter" @change="loadPosts(1)"
                  class="bg-white/10 border border-white/20 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-400">
            <option value="">全部</option>
            <option value="pending">待审核</option>
            <option value="approved">已通过</option>
            <option value="rejected">已拒绝</option>
          </select>
        </div>
        <div class="glass rounded-2xl overflow-hidden">
          <table class="w-full text-sm">
            <thead class="border-b border-white/10 text-white/50">
              <tr>
                <th class="text-left px-4 py-3">作者</th>
                <th class="text-left px-4 py-3">内容</th>
                <th class="text-left px-4 py-3">发布时间</th>
                <th class="text-left px-4 py-3">状态</th>
                <th class="text-left px-4 py-3">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="p in posts" :key="p.id">
                <tr class="border-b border-white/5 hover:bg-white/5">
                  <td class="px-4 py-3 text-white/80" x-text="p.author_name || '匿名'"></td>
                  <td class="px-4 py-3 text-white/60 max-w-xs truncate" x-text="p.content"></td>
                  <td class="px-4 py-3 text-white/50" x-text="p.created_at ? p.created_at.slice(0,10) : '—'"></td>
                  <td class="px-4 py-3">
                    <span :class="{
                      'bg-yellow-500/20 text-yellow-400': p.status === 'pending',
                      'bg-green-500/20 text-green-400': p.status === 'approved',
                      'bg-red-500/20 text-red-400': p.status === 'rejected'
                    }" class="px-2 py-0.5 rounded-full text-xs"
                    x-text="p.status === 'approved' ? '已通过' : p.status === 'rejected' ? '已拒绝' : '待审核'"></span>
                  </td>
                  <td class="px-4 py-3 flex gap-2">
                    <button x-show="p.status !== 'approved'" @click="approvePost(p)"
                            class="text-xs text-green-400 hover:text-green-300 transition">通过</button>
                    <button x-show="p.status !== 'rejected'" @click="rejectPost(p)"
                            class="text-xs text-red-400 hover:text-red-300 transition">拒绝</button>
                  </td>
                </tr>
              </template>
              <tr x-show="!posts.length && !postsLoading">
                <td colspan="5" class="text-center text-white/30 py-8">暂无数据</td>
              </tr>
              <tr x-show="postsLoading">
                <td colspan="5" class="text-center text-white/30 py-8">加载中…</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center mt-4 text-sm text-white/50">
          <span>共 <span x-text="postsTotal"></span> 条</span>
          <div class="flex gap-2">
            <button @click="postsPage > 1 && loadPosts(postsPage - 1)"
                    :disabled="postsPage <= 1"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">上一页</button>
            <span class="px-3 py-1" x-text="'第 ' + postsPage + ' 页'"></span>
            <button @click="postsPage * 20 < postsTotal && loadPosts(postsPage + 1)"
                    :disabled="postsPage * 20 >= postsTotal"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">下一页</button>
          </div>
        </div>
      </div>

      <!-- 向导审核 -->
      <div x-show="page === 'guides'">
        <h2 class="text-xl font-bold mb-6">🧭 向导审核</h2>
        <div class="glass rounded-2xl overflow-hidden">
          <table class="w-full text-sm">
            <thead class="border-b border-white/10 text-white/50">
              <tr>
                <th class="text-left px-4 py-3">姓名</th>
                <th class="text-left px-4 py-3">专长</th>
                <th class="text-left px-4 py-3">证书</th>
                <th class="text-left px-4 py-3">申请时间</th>
                <th class="text-left px-4 py-3">状态</th>
                <th class="text-left px-4 py-3">操作</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="g in guides" :key="g.id">
                <tr class="border-b border-white/5 hover:bg-white/5">
                  <td class="px-4 py-3 text-white/80" x-text="g.name"></td>
                  <td class="px-4 py-3 text-white/60" x-text="g.specialty || '—'"></td>
                  <td class="px-4 py-3 text-white/60" x-text="g.cert || '—'"></td>
                  <td class="px-4 py-3 text-white/50" x-text="g.created_at ? g.created_at.slice(0,10) : '—'"></td>
                  <td class="px-4 py-3">
                    <span :class="{
                      'bg-yellow-500/20 text-yellow-400': g.status === 'pending',
                      'bg-green-500/20 text-green-400': g.status === 'approved',
                      'bg-red-500/20 text-red-400': g.status === 'rejected'
                    }" class="px-2 py-0.5 rounded-full text-xs"
                    x-text="g.status === 'approved' ? '已批准' : g.status === 'rejected' ? '已拒绝' : '待审核'"></span>
                  </td>
                  <td class="px-4 py-3 flex gap-2">
                    <button x-show="g.status !== 'approved'" @click="approveGuide(g)"
                            class="text-xs text-green-400 hover:text-green-300 transition">批准</button>
                    <button x-show="g.status !== 'rejected'" @click="rejectGuide(g)"
                            class="text-xs text-red-400 hover:text-red-300 transition">拒绝</button>
                  </td>
                </tr>
              </template>
              <tr x-show="!guides.length && !guidesLoading">
                <td colspan="6" class="text-center text-white/30 py-8">暂无数据</td>
              </tr>
              <tr x-show="guidesLoading">
                <td colspan="6" class="text-center text-white/30 py-8">加载中…</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center mt-4 text-sm text-white/50">
          <span>共 <span x-text="guidesTotal"></span> 条</span>
          <div class="flex gap-2">
            <button @click="guidesPage > 1 && loadGuides(guidesPage - 1)"
                    :disabled="guidesPage <= 1"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">上一页</button>
            <span class="px-3 py-1" x-text="'第 ' + guidesPage + ' 页'"></span>
            <button @click="guidesPage * 20 < guidesTotal && loadGuides(guidesPage + 1)"
                    :disabled="guidesPage * 20 >= guidesTotal"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">下一页</button>
          </div>
        </div>
      </div>

      <!-- 订单管理 -->
      <div x-show="page === 'orders'">
        <h2 class="text-xl font-bold mb-6">💰 订单管理</h2>
        <div class="glass rounded-2xl overflow-hidden">
          <table class="w-full text-sm">
            <thead class="border-b border-white/10 text-white/50">
              <tr>
                <th class="text-left px-4 py-3">订单号</th>
                <th class="text-left px-4 py-3">金额</th>
                <th class="text-left px-4 py-3">支付方式</th>
                <th class="text-left px-4 py-3">状态</th>
                <th class="text-left px-4 py-3">时间</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="o in orders" :key="o.id">
                <tr class="border-b border-white/5 hover:bg-white/5">
                  <td class="px-4 py-3 text-white/60 font-mono text-xs" x-text="o.order_no"></td>
                  <td class="px-4 py-3 text-yellow-400 font-semibold" x-text="o.amount ? '¥' + o.amount : '—'"></td>
                  <td class="px-4 py-3 text-white/60" x-text="o.method || '—'"></td>
                  <td class="px-4 py-3">
                    <span :class="{
                      'bg-yellow-500/20 text-yellow-400': o.status === 'pending',
                      'bg-green-500/20 text-green-400': o.status === 'paid',
                      'bg-red-500/20 text-red-400': o.status === 'failed'
                    }" class="px-2 py-0.5 rounded-full text-xs"
                    x-text="o.status === 'paid' ? '已支付' : o.status === 'failed' ? '失败' : '待支付'"></span>
                  </td>
                  <td class="px-4 py-3 text-white/50" x-text="o.created_at ? o.created_at.slice(0,16) : '—'"></td>
                </tr>
              </template>
              <tr x-show="!orders.length && !ordersLoading">
                <td colspan="5" class="text-center text-white/30 py-8">暂无数据</td>
              </tr>
              <tr x-show="ordersLoading">
                <td colspan="5" class="text-center text-white/30 py-8">加载中…</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="flex justify-between items-center mt-4 text-sm text-white/50">
          <span>共 <span x-text="ordersTotal"></span> 条</span>
          <div class="flex gap-2">
            <button @click="ordersPage > 1 && loadOrders(ordersPage - 1)"
                    :disabled="ordersPage <= 1"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">上一页</button>
            <span class="px-3 py-1" x-text="'第 ' + ordersPage + ' 页'"></span>
            <button @click="ordersPage * 20 < ordersTotal && loadOrders(ordersPage + 1)"
                    :disabled="ordersPage * 20 >= ordersTotal"
                    class="px-3 py-1 glass rounded-lg disabled:opacity-30 hover:bg-white/10">下一页</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    function adminApp() {
      return {
        isLoggedIn: false,
        page: 'stats',
        loginLoading: false,
        loginForm: { username: '', password: '' },
        toasts: [],

        navItems: [
          { id: 'stats',  icon: '📊', label: '数据总览' },
          { id: 'users',  icon: '👥', label: '用户管理' },
          { id: 'posts',  icon: '📝', label: '内容审核' },
          { id: 'guides', icon: '🧭', label: '向导审核' },
          { id: 'orders', icon: '💰', label: '订单管理' },
        ],

        // Stats
        statsCards: [],
        statsLoading: false,

        // Users
        users: [], usersTotal: 0, usersPage: 1, usersLoading: false, userSearch: '',

        // Posts
        posts: [], postsTotal: 0, postsPage: 1, postsLoading: false, postsFilter: '',

        // Guides
        guides: [], guidesTotal: 0, guidesPage: 1, guidesLoading: false,

        // Orders
        orders: [], ordersTotal: 0, ordersPage: 1, ordersLoading: false,

        async init() {
          try {
            await this.api('GET', '/check');
            this.isLoggedIn = true;
            this.loadPage();
          } catch (e) {
            this.isLoggedIn = false;
          }
        },

        showToast(msg, type = 'success') {
          this.toasts.push({ msg, type });
          setTimeout(() => { this.toasts.shift(); }, 3000);
        },

        async api(method, path, body) {
          const opts = {
            method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
          };
          if (body) opts.body = JSON.stringify(body);
          const r = await fetch('/api/admin' + path, opts);
          if (r.status === 401 || r.status === 403) {
            this.isLoggedIn = false;
            throw new Error('登录已过期，请重新登录');
          }
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || '请求失败');
          return data;
        },

        async doLogin() {
          this.loginLoading = true;
          try {
            const r = await fetch('/api/admin/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify(this.loginForm),
            });
            const d = await r.json();
            if (!r.ok) throw new Error(d.error || '登录失败');
            this.isLoggedIn = true;
            this.loadPage();
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally {
            this.loginLoading = false;
          }
        },

        async logout() {
          try {
            await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
          } catch (e) {
            // ignore
          }
          this.isLoggedIn = false;
        },

        loadPage() {
          if (this.page === 'stats') this.loadStats();
          else if (this.page === 'users') this.loadUsers(1);
          else if (this.page === 'posts') this.loadPosts(1);
          else if (this.page === 'guides') this.loadGuides(1);
          else if (this.page === 'orders') this.loadOrders(1);
        },

        async loadStats() {
          this.statsLoading = true;
          try {
            const d = await this.api('GET', '/stats');
            this.statsCards = [
              { icon: '👥', label: '总用户数', value: d.totalUsers },
              { icon: '📝', label: '总帖子数', value: d.totalPosts },
              { icon: '💰', label: '总订单数', value: d.totalOrders },
              { icon: '🆕', label: '今日新增用户', value: d.newUsersToday },
              { icon: '⏳', label: '待审核帖子', value: d.pendingPosts },
              { icon: '🧭', label: '待审核向导申请', value: d.pendingGuides },
            ];
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally {
            this.statsLoading = false;
          }
        },

        async loadUsers(p) {
          this.usersLoading = true; this.usersPage = p;
          try {
            const d = await this.api('GET', `/users?page=${p}&search=${encodeURIComponent(this.userSearch)}`);
            this.users = d.users; this.usersTotal = d.total;
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally { this.usersLoading = false; }
        },

        async banUser(u) {
          try {
            const d = await this.api('PUT', `/users/${u.id}/ban`);
            u.is_banned = d.is_banned;
            this.showToast(d.is_banned ? '已封禁用户' : '已解封用户');
          } catch (e) {
            this.showToast(e.message, 'error');
          }
        },

        async loadPosts(p) {
          this.postsLoading = true; this.postsPage = p;
          try {
            const d = await this.api('GET', `/posts?page=${p}&status=${encodeURIComponent(this.postsFilter)}`);
            this.posts = d.posts; this.postsTotal = d.total;
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally { this.postsLoading = false; }
        },

        async approvePost(p) {
          try {
            await this.api('PUT', `/posts/${p.id}/approve`);
            p.status = 'approved';
            this.showToast('帖子已通过审核');
          } catch (e) {
            this.showToast(e.message, 'error');
          }
        },

        async rejectPost(p) {
          try {
            await this.api('PUT', `/posts/${p.id}/reject`);
            p.status = 'rejected';
            this.showToast('帖子已拒绝');
          } catch (e) {
            this.showToast(e.message, 'error');
          }
        },

        async loadGuides(p) {
          this.guidesLoading = true; this.guidesPage = p;
          try {
            const d = await this.api('GET', `/guides?page=${p}`);
            this.guides = d.guides; this.guidesTotal = d.total;
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally { this.guidesLoading = false; }
        },

        async approveGuide(g) {
          try {
            await this.api('PUT', `/guides/${g.id}/approve`);
            g.status = 'approved';
            this.showToast('向导申请已批准');
          } catch (e) {
            this.showToast(e.message, 'error');
          }
        },

        async rejectGuide(g) {
          try {
            await this.api('PUT', `/guides/${g.id}/reject`);
            g.status = 'rejected';
            this.showToast('向导申请已拒绝');
          } catch (e) {
            this.showToast(e.message, 'error');
          }
        },

        async loadOrders(p) {
          this.ordersLoading = true; this.ordersPage = p;
          try {
            const d = await this.api('GET', `/orders?page=${p}`);
            this.orders = d.orders; this.ordersTotal = d.total;
          } catch (e) {
            this.showToast(e.message, 'error');
          } finally { this.ordersLoading = false; }
        },
      };
    }
  </script>
