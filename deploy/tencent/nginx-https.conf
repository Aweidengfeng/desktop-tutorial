events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Gzip 压缩（4Mbps 带宽下必须启用）
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

  # 日志格式
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # 上游后端
  upstream summitlink_backend {
    server backend:8080;
    keepalive 32;
  }

  # API 限流：30 req/s，burst=50
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  # 上传限流：5 req/s，burst=10
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

  # HTTP → HTTPS 重定向（生产环境 + ICP 备案完成后启用）
  server {
    listen 80;
    server_name summitlink.app www.summitlink.app api-cn.summitlink.app;

    # Let's Encrypt ACME challenge（证书续签用）
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS 主站
  server {
    listen 443 ssl http2;
    server_name summitlink.app www.summitlink.app api-cn.summitlink.app;

    ssl_certificate     /etc/letsencrypt/live/summitlink.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/summitlink.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态上传文件（CDN 长期缓存）
    location /uploads/ {
      alias /app/uploads/;
      expires 365d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options nosniff;
      add_header Vary Accept-Encoding;
    }

    # Universal Links / App Links — 不缓存、不重定向
    location /.well-known/ {
      proxy_pass http://summitlink_backend;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # JS / CSS / 图片等静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://summitlink_backend;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      add_header Vary Accept-Encoding;
    }

    # 上传接口（独立限流）
    location /api/upload {
      limit_req zone=upload burst=10 nodelay;
      client_max_body_size 210m;
      proxy_pass http://summitlink_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # API 接口（限流 + 不缓存）
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://summitlink_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      add_header Cache-Control "no-store, no-cache";
    }

    # Socket.IO WebSocket 支持
    location /socket.io/ {
      proxy_pass http://summitlink_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;
    }

    # 前端 SPA（不缓存 HTML）
    location / {
      proxy_pass http://summitlink_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-cache, must-revalidate";
    }
  }
}
